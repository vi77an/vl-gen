<script>
// ── Luhn ──────────────────────────────────────────────────────────────────────
function luhnValid(num) {
  let total = 0;
  const rev = num.split('').reverse();
  for (let i = 0; i < rev.length; i++) {
    let n = parseInt(rev[i]);
    if (i % 2 === 1) { n *= 2; if (n > 9) n -= 9; }
    total += n;
  }
  return total % 10 === 0;
}

function luhnComplete(prefix) {
  for (let d = 0; d <= 9; d++) {
    if (luhnValid(prefix + d)) return prefix + d;
  }
  return null;
}

// ── Parse ─────────────────────────────────────────────────────────────────────
function parseInput(raw) {
  const parts = raw.trim().split(/[^0-9xX]+/).filter(Boolean);
  if (!parts.length) throw new Error('Entrada inválida.');

  let card  = parts[0].toLowerCase();
  let month = parts[1] || '12';
  let year  = parts[2] || '99';

  if (year.length === 4) year = year.slice(2);

  return { card, month: month.padStart(2,'0'), year, cvv: '000' };
}
// @vi77an
function validateDate(month, year) {
  const now  = new Date();
  const nowY = now.getFullYear() % 100;
  const nowM = now.getMonth() + 1;
  const y    = parseInt(year, 10);
  const m    = parseInt(month, 10);
  if (y > nowY) return true;
  if (y === nowY && m >= nowM) return true;
  return false;
}

function isCompleteCard(card) { return card.length === 16 && /^\d+$/.test(card); }
function isPartialCard(card)  { return card.length === 16 && card.includes('x'); }
function isIncompleteCard(card) { return !card.includes('x') && card.length < 16; }

// ── Generate ──────────────────────────────────────────────────────────────────
function* cartesian(choices) {
  if (!choices.length) { yield []; return; }
  for (const head of choices[0])
    for (const tail of cartesian(choices.slice(1)))
      yield [head, ...tail];
}
// @vi77an
function generateFromPattern(pattern, month, year) {
  const xPos = [...pattern].reduce((a, c, i) => (c === 'x' ? [...a, i] : a), []);
  if (!xPos.length) {
    return luhnValid(pattern) ? [{ card_number: pattern, month, year, cvv:'000' }] : [];
  }

  const lastX  = xPos[xPos.length - 1];
  const fixedX = xPos.slice(0, -1);
  const cards  = [];
  const digits = '0123456789'.split('');
  const choices = fixedX.map(() => digits);

  for (const combo of cartesian(choices)) {
    const chars = pattern.split('');
    fixedX.forEach((pos, i) => { chars[pos] = combo[i]; });
    const prefix = chars.slice(0, lastX).join('');
    const candidate = luhnComplete(prefix);
    if (!candidate) continue;
    const tail = pattern.slice(lastX + 1);
    const full = candidate + tail;
    if (full.length !== 16 || !luhnValid(full)) continue;
    cards.push({ card_number: full, month, year, cvv: '000' });
  }
  return cards;
}

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  parsed: null,
  mode: null,       // 'complete' | 'partial' | 'incomplete'
  variation: null,  // 0-3 for complete mode
  extraDigits: [],
  cards: [],
};

const $ = id => document.getElementById(id);

// ── UI helpers ─────────────────────────────────────────────────────────────────
function setHint(msg, cls='') {
  const h = $('hint');
  h.textContent = msg;
  h.className = 'hint ' + cls;
}
// @vi77an
function showToast(msg, type='') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='err' ? 'err-toast' : type==='ok' ? 'ok-toast' : '');
  requestAnimationFrame(() => { t.classList.add('show'); });
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.classList.remove('show'); }, 2200);
}

function enableGenerate(yes) {
  $('generate-btn').disabled = !yes;
}

// ── Input watcher ─────────────────────────────────────────────────────────────
$('raw-input').addEventListener('input', onInput);
$('raw-input').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
$('clear-btn').addEventListener('click', () => {
  $('raw-input').value = '';
  $('clear-btn').classList.remove('visible');
  resetState();
});

function onInput() {
  const raw = $('raw-input').value.trim();
  $('clear-btn').classList.toggle('visible', raw.length > 0);
  resetVariation();

  if (!raw) { resetState(); return; }
// @vi77an
  let parsed;
  try { parsed = parseInput(raw); }
  catch { setHint('Formato inválido.', 'err'); enableGenerate(false); return; }

  if (!validateDate(parsed.month, parsed.year)) {
    setHint(`Cartão expirado — ${parsed.month}/${parsed.year}`, 'err');
    state.parsed = null;
    enableGenerate(false);
    return;
  }

  state.parsed = parsed;
  const { card } = parsed;

  if (isCompleteCard(card)) {
    state.mode = 'complete';
    setHint(`Cartão completo detectado · ${luhnValid(card) ? '✓ Luhn válido' : '✗ Luhn inválido'}`, luhnValid(card) ? 'ok' : 'warn');
    buildVariationPicker(card, parsed.month, parsed.year);
    enableGenerate(false); // requires variation pick
  } else if (isPartialCard(card)) {
    state.mode = 'partial';
    const nx = (card.match(/x/g)||[]).length;
    const est = nx > 1 ? Math.pow(10, nx - 1) : 10;
    setHint(`Padrão com x · ~${est} combinação(ões) válidas`, 'ok');
    hideVariation();
    enableGenerate(true);
  } else if (isIncompleteCard(card)) {
    state.mode = 'incomplete';
    const missing = 16 - card.length;
    const pattern = card + 'x'.repeat(missing);
    const est = missing > 1 ? Math.pow(10, missing - 1) : 10;
    setHint(`Incompleto · completando com ${missing}x → ~${est} válidas`, 'ok');
    hideVariation();
    enableGenerate(true); // @vi77an
  } else {
    setHint('Formato de cartão inválido.', 'err');
    state.parsed = null;
    enableGenerate(false);
  }
}

// ── Variation picker ────────────────────────────────────────────────────────── // @vi77an
function buildVariationPicker(card, month, year) {
  const prefix12 = card.slice(0, 12);
  const section  = $('variation-section');
  const grid     = $('variation-grid');
  section.classList.add('visible');
  grid.innerHTML = '';
  $('extra-digits').className = 'extra-digits';

  const variants = [
    { badge: '1.000x', label: prefix12 + 'xxxx', desc: '4 variáveis' },
    { badge:  '100x',  label: prefix12 + '?xxx',  desc: '3 variáveis + 1 seu' },
    { badge:   '10x',  label: prefix12 + '??xx',  desc: '2 variáveis + 2 seus' },
  ];

  variants.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'var-option';
    btn.innerHTML = `
      <span class="var-badge">${v.badge}</span>
      <span class="var-label">${v.label.replace(/\?/g,'<span style="color:var(--accent)">?</span>')}</span>
      <span class="var-desc">${v.desc}</span>
    `;
    btn.addEventListener('click', () => selectVariation(i, card, month, year));
    grid.appendChild(btn);
  });
}

function selectVariation(idx, card, month, year) {
  const prefix12 = card.slice(0, 12);
  document.querySelectorAll('.var-option').forEach((b,i) => b.classList.toggle('selected', i===idx));
  state.variation = idx;
  const ed = $('extra-digits');
  ed.innerHTML = '';
  ed.className = 'extra-digits'; // hidden

  if (idx === 0) {
    state._pattern = prefix12 + 'xxxx';
    enableGenerate(true);
  } else if (idx === 1) {
    ed.className = 'extra-digits visible';
    ed.innerHTML = `
      <span class="digit-label-small">13º dígito:</span>
      <input class="digit-input" id="ed1" maxlength="1" placeholder="0-9">
    `;
    $('ed1').addEventListener('input', () => {
      const d = $('ed1').value;
      if (/^\d$/.test(d)) { state._pattern = prefix12 + d + 'xxx'; enableGenerate(true); }
      else enableGenerate(false); // @vi77an
    });
    enableGenerate(false);
  } else if (idx === 2) {
    ed.className = 'extra-digits visible';
    ed.innerHTML = `
      <span class="digit-label-small">13º:</span>
      <input class="digit-input" id="ed1" maxlength="1" placeholder="0-9">
      <span class="digit-label-small">14º:</span>
      <input class="digit-input" id="ed2" maxlength="1" placeholder="0-9">
    `;
    const check2 = () => {
      const d1 = $('ed1').value, d2 = $('ed2').value;
      if (/^\d$/.test(d1) && /^\d$/.test(d2)) { state._pattern = prefix12 + d1 + d2 + 'xx'; enableGenerate(true); }
      else enableGenerate(false);
    };
    $('ed1').addEventListener('input', check2);
    $('ed2').addEventListener('input', check2);
    enableGenerate(false);
  }
}

function hideVariation() {
  $('variation-section').classList.remove('visible');
  $('extra-digits').className = 'extra-digits';
}

function resetVariation() {
  hideVariation();
  state.variation = null;
  state._pattern  = null;
}

function resetState() {
  state = { parsed:null, mode:null, variation:null, extraDigits:[], cards:[] };
  setHint('Formatos aceitos: CARTÃO|MM|AA · separadores flexíveis · x = dígito variável');
  hideVariation();
  enableGenerate(false);
  $('results').innerHTML = '';
} // @vi77an

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  const { parsed, mode } = state;
  if (!parsed) return;

  const btn = $('generate-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  // yield to browser to update UI
  await new Promise(r => setTimeout(r, 0));

  let pattern;
  if (mode === 'complete') {
    pattern = state._pattern;
  } else if (mode === 'partial') {
    pattern = parsed.card;
  } else if (mode === 'incomplete') {
    const missing = 16 - parsed.card.length;
    pattern = parsed.card + 'x'.repeat(missing);
  }

  if (!pattern) {
    showToast('Selecione uma variação.', 'err');
    btn.classList.remove('loading');
    btn.disabled = false;
    return;
  }

  if (pattern.slice(0,6).includes('x')) {
    showToast('Os 6 primeiros dígitos (BIN) devem ser fixos.', 'err');
    btn.classList.remove('loading');
    btn.disabled = false;
    return;
  }
// @vi77an
  let cards;
  try {
    cards = generateFromPattern(pattern, parsed.month, parsed.year);
  } catch(e) {
    showToast('Erro na geração.', 'err');
    btn.classList.remove('loading');
    btn.disabled = false;
    return;
  }

  btn.classList.remove('loading');
  btn.disabled = false;

  if (!cards.length) {
    showToast('Nenhum cartão válido gerado.', 'err');
    return;
  }

  state.cards = cards;
  renderResults(cards, pattern);
  showToast(`${cards.length} cartão(ões) gerado(s)`, 'ok');
}

$('generate-btn').addEventListener('click', generate);

// ── Render results ────────────────────────────────────────────────────────────
function renderResults(cards, pattern) {
  const el = $('results');
  const rows = cards.map(c =>
    `<tr onclick="copyRow(this,'${c.card_number}|${c.month}|${c.year}|${c.cvv}')">
      <td class="card-num">${c.card_number}</td>
      <td class="mm">${c.month}</td>
      <td class="yy">${c.year}</td>
      <td class="cvv">${c.cvv}</td> 
    </tr>`
  ).join('');

  el.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="result-title">Resultados · <code style="color:var(--accent);font-size:.85em">${pattern}</code></span>
        <div class="result-meta">
          <span class="count-badge">${cards.length}</span>
          <div class="result-actions">
            <button class="action-btn" id="copy-all-btn" onclick="copyAll()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copiar tudo
            </button>
            <button class="action-btn" onclick="downloadCSV()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              CSV
            </button>
          </div>
        </div>
      </div>
      <div class="result-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Número</th>
              <th>MM</th>
              <th>AA</th>
              <th>CVV</th>
            </tr>
          </thead>
          <tbody id="result-body">${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function copyRow(tr, text) {
  navigator.clipboard.writeText(text).catch(()=>{});
  tr.classList.add('flash');
  setTimeout(() => tr.classList.remove('flash'), 350);
  showToast('Copiado!', 'ok');
}

function copyAll() {
  const lines = state.cards.map(c => `${c.card_number}|${c.month}|${c.year}|${c.cvv}`).join('\n');
  navigator.clipboard.writeText(lines).then(() => {
    const btn = $('copy-all-btn');
    btn.classList.add('copied');
    btn.querySelector('span') && (btn.querySelector('span').textContent = 'Copiado!');
    btn.textContent = '✓ Copiado!';
    setTimeout(() => { btn.textContent = ''; btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar tudo`; btn.classList.remove('copied'); }, 1800);
    showToast('Tudo copiado!', 'ok');
  }).catch(() => showToast('Erro ao copiar.', 'err'));
}

function downloadCSV() {
  const header = 'card_number,month,year,cvv\n';
  const rows   = state.cards.map(c => `${c.card_number},${c.month},${c.year},${c.cvv}`).join('\n');
  const blob   = new Blob([header + rows], { type: 'text/csv' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href       = url;
  const fileNameSafe = `vl@gen_${(state.cards[0]?.card_number || 'sem_num')}.csv`.replace(/[\/:\\?%*|"<>]/g, '_');
  a.download   = fileNameSafe;
  document.body.appendChild(a);
  console.log('download attribute:', a.download);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV baixado!', 'ok');
}
</script>
